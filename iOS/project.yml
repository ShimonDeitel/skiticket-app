name: Skiticket
options:
  bundleIdPrefix: com.shimondeitel.liftpasscost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Skiticket:
    type: application
    platform: iOS
    sources:
      - path: Skiticket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.liftpasscost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Skiticket/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SkiticketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkiticketTests
      - path: Skiticket.storekit
    dependencies:
      - target: Skiticket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.liftpasscost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SkiticketUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SkiticketUITests
    dependencies:
      - target: Skiticket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.liftpasscost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Skiticket:
    build:
      targets:
        Skiticket: all
        SkiticketTests: [test]
        SkiticketUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Skiticket.storekit
    test:
      config: Debug
      storeKitConfiguration: Skiticket.storekit
      targets:
        - SkiticketTests
        - SkiticketUITests
    archive:
      config: Release
