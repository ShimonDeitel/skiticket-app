<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skiticket</title>
<style>
 body { margin:0; background:#0B1420; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
 .wrap { max-width:560px; padding:32px; }
 h1 { color:#2E6E9E; font-size:2.2rem; margin-bottom:8px; }
 p { color:#ccc; line-height:1.6; }
 .accent { color:#D64550; }
 a { color:#2E6E9E; }
 .badge { display:inline-block; margin-top:24px; padding:10px 20px; border:1px solid #2E6E9E; border-radius:8px; color:#2E6E9E; text-decoration:none; margin-right:8px; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #2E6E9E55 0%, #2E6E9E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
<h1>Skiticket</h1>
<p>Track what ski lift tickets and passes cost across a season.</p>
<p class="accent">Log resort, ticket cost, and date.</p>
<a class="badge" href="privacy.html">Privacy Policy</a>
<a class="badge" href="terms.html">Terms of Use</a>
<p style="margin-top:32px; font-size:0.85rem; color:#888;">Contact: s0533495227@gmail.com</p>
</div>
</body>
</html>
